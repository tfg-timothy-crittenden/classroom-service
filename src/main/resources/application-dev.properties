spring.sql.init.mode=always


spring.docker.compose.enabled=false

# Don't look for schema.sql; Hibernate will create/update tables in dev
spring.sql.init.schema-locations=

# Ensure Hibernate creates the schema before data.sql runs
spring.jpa.defer-datasource-initialization=true

# Hibernate manages schema in dev
spring.jpa.hibernate.ddl-auto=update

# Disable open-in-view to avoid lazy loading issues
spring.jpa.open-in-view=false

# Suppress security autoconfiguration warnings in dev (we're using permitAll)
logging.level.org.springframework.boot.autoconfigure.security=ERROR

# Local auth-service database (isolated from the original project)
spring.datasource.url=jdbc:postgresql://localhost:5435/classroom_db
spring.datasource.username=myuser
spring.datasource.password=secret


# Keep Flyway pointed to the same database explicitly
spring.flyway.baseline-on-migrate=true
spring.flyway.url=jdbc:postgresql://localhost:5435/classroom_db
spring.flyway.user=myuser
spring.flyway.password=secret

# Kafka configuration for local/dev execution
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest

classroom.kafka.material-deleted-topic=material.deleted.v1
classroom.kafka.material-deleted-group-id=classroom-service-material-deleted
classroom.kafka.material-titles-updated-topic=material.titles.updated.v1
classroom.kafka.material-titles-updated-group-id=classroom-service-material-titles-updated
classroom.kafka.user-teacher-role-revoked-topic=user.teacher-role-revoked.v1
classroom.kafka.user-teacher-role-revoked-group-id=classroom-service-user-teacher-role-revoked


security.internal.api-key=change-me-dev-internal-api-key

# Ensure /api paths go to controllers, not static resource handler
spring.mvc.static-path-pattern=/static/**
spring.web.resources.static-locations=classpath:/static/

