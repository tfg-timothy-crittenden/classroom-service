spring.application.name=classroom-service
spring.cloud.config.enabled=false
server.port=8083




spring.docker.compose.enabled=false

logging.level.com.netflix.discovery=DEBUG
logging.level.org.springframework.cloud.netflix.eureka=DEBUG
logging.level.org.springframework.core.env=DEBUG

eureka.instance.hostname=host.docker.internal
eureka.instance.nonSecurePort=8083
eureka.instance.preferIpAddress=false
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

security.internal.api-key=${SECURITY_INTERNAL_API_KEY:change-me-internal-api-key}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest

classroom.kafka.material-deleted-topic=material.deleted.v1
classroom.kafka.material-deleted-group-id=classroom-service-material-deleted
classroom.kafka.material-titles-updated-topic=material.titles.updated.v1
classroom.kafka.material-titles-updated-group-id=classroom-service-material-titles-updated
classroom.kafka.user-teacher-role-revoked-topic=user.teacher-role-revoked.v1
classroom.kafka.user-teacher-role-revoked-group-id=classroom-service-user-teacher-role-revoked

